<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Database - Rentify</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .reset-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
        }
        
        h1 {
            color: #333;
            margin-top: 0;
        }
        
        p {
            color: #666;
            line-height: 1.6;
        }
        
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .status.resetting {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status.success {
            background: #e8f5e9;
            color: #388e3c;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1976d2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .redirect-message {
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h1>🔄 Resetting Database</h1>
        <p>Clearing all stored data and seeding fresh properties with new images...</p>
        
        <div class="status resetting" id="status">
            <span class="spinner"></span>
            <span id="status-text">Resetting...</span>
        </div>
        
        <div class="redirect-message" id="redirect-message" style="display: none;">
            Redirecting in <span id="countdown">3</span> seconds...
        </div>
    </div>

    <script>
        // Clear all localStorage keys
        const keysToRemove = [
            'rms_users',
            'rms_properties',
            'rms_units',
            'rms_leases',
            'rms_payments',
            'rms_maintenance',
            'rms_applications',
            'rms_current_user',
            'rms_session_token',
            'rms_notifications'
        ];

        // Remove all keys
        keysToRemove.forEach(key => {
            localStorage.removeItem(key);
        });

        // Update status
        const statusEl = document.getElementById('status');
        const statusText = document.getElementById('status-text');
        const redirectMessage = document.getElementById('redirect-message');
        const countdownEl = document.getElementById('countdown');

        statusEl.className = 'status success';
        statusText.textContent = '✓ Database reset successfully!';
        
        // Show redirect message
        setTimeout(() => {
            redirectMessage.style.display = 'block';
            
            // Countdown
            let countdown = 3;
            const interval = setInterval(() => {
                countdown--;
                countdownEl.textContent = countdown;
                if (countdown === 0) {
                    clearInterval(interval);
                    window.location.href = './index.html';
                }
            }, 1000);
        }, 1000);
    </script>
</body>
</html>
